name: Android Appium Automation

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appium-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Appium & Drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2@2

      - name: Build Android App (APK)
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Run Appium Tests in Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86
          profile: Nexus 6
          script: |
            # Start Appium server in background
            appium &
            # Wait for Appium to start
            sleep 5
            # Run the test task for the Appium subproject
            ./gradlew :appium-tests:test

      - name: Upload Excel Test Cases Report
        uses: actions/upload-artifact@v4
        with:
          name: Appium_Excel_Report
          path: appium-tests/reports/TestCases.xlsx

      - name: Upload Extent HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: Appium_Extent_Report
          path: appium-tests/reports/ExtentReport/

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: Appium_Allure_Results
          path: appium-tests/allure-results/

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: Appium_Screenshots
          path: appium-tests/screenshots/

      - name: Upload Screen Recordings
        uses: actions/upload-artifact@v4
        with:
          name: Appium_Screen_Recordings
          path: appium-tests/screenrecordings/

      - name: Upload Appium Logs
        uses: actions/upload-artifact@v4
        with:
          name: Appium_Logs
          path: appium-tests/logs/
